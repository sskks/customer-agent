[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
  [plugins.inputs]

# Fix: redirect /_next/* to /static/* since plugin's onPostBuild may not run
[[redirects]]
  from = "/_next/*"
  to = "/:splat"
  status = 200

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
