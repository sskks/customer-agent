[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 环境变量（在 Netlify UI 中配置，不要硬编码在这里）
# QWEN_API_KEY
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# DOUYIN_HOT_API_KEY (可选)

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
