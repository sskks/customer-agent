version: '3.8'

services:
  dianbo-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      # AI API Key (required)
      - QWEN_API_KEY=${QWEN_API_KEY}
      
      # Supabase Configuration (required for auth and database)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      
      # Optional: Douyin Hot API Key
      - DOUYIN_HOT_API_KEY=${DOUYIN_HOT_API_KEY}
      
      # Node.js settings
      - NODE_ENV=production
      - PORT=3000
    
    restart: always
    
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - app-network
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

